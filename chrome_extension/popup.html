<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .title {
      font-weight: 800;
      font-size: 16px;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge {
      background: #059669;
      color: #ffffff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .label {
      color: #94a3b8;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .val {
      color: #f8fafc;
      font-weight: 600;
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">⚡ JobSpike AI</div>
    <span class="badge">v1.0 LIVE</span>
  </div>

  <div class="card">
    <div class="label">Active Candidate Profile</div>
    <div class="val" id="profileName">👤 Alex Morgan</div>
    <div style="color: #38bdf8; margin-top: 2px;" id="profileRole">Senior DevOps Engineer</div>
  </div>

  <div class="card">
    <div class="label">Supported Portals</div>
    <div style="color: #4ade80; font-weight: 600;">✓ LinkedIn Easy Apply</div>
    <div style="color: #4ade80; font-weight: 600;">✓ Workday / Lever / Greenhouse</div>
    <div style="color: #4ade80; font-weight: 600;">✓ Indeed &amp; Glassdoor</div>
  </div>

  <button class="btn" id="autofillBtn">
    ⚡ Auto-Fill Active Application Form
  </button>

  <div class="footer">
    Powered by JobSpike Auto-Apply Engine
  </div>

  <script src="popup.js"></script>
</body>
</html>
