<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .title {
      font-weight: 800;
      font-size: 16px;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-badge {
      background: rgba(5, 150, 105, 0.2);
      color: #34d399;
      border: 1px solid #059669;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .label {
      color: #94a3b8;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      color: #f8fafc;
      font-size: 12px;
      margin-bottom: 8px;
    }
    input:focus {
      outline: none;
      border-color: #38bdf8;
    }
    .upload-box {
      border: 2px dashed #38bdf8;
      background: rgba(56, 189, 248, 0.05);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .upload-box:hover {
      background: rgba(56, 189, 248, 0.12);
    }
    .file-name {
      font-size: 11px;
      color: #4ade80;
      font-weight: 700;
      margin-top: 4px;
      word-break: break-all;
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
      margin-top: 6px;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary {
      background: #334155;
      color: #f8fafc;
      margin-top: 8px;
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">⚡ JobSpike Pro</div>
    <div class="status-badge" id="authBadge">● Account Synced</div>
  </div>

  <!-- Resume PDF Attachment Upload -->
  <div class="card">
    <div class="label">📄 Target Resume PDF Attachment</div>
    <div class="upload-box" id="uploadDropzone" onclick="document.getElementById('pdfInput').click()">
      <div style="font-size: 20px;">📤</div>
      <div style="font-size: 12px; font-weight: 700; color: #f8fafc;">Select Candidate Resume PDF</div>
      <div style="font-size: 10px; color: #94a3b8;">Click to upload .pdf for Easy Apply</div>
      <div class="file-name" id="fileNameDisplay">No PDF attached yet</div>
    </div>
    <input type="file" id="pdfInput" accept=".pdf" style="display: none;">
  </div>

  <!-- Candidate Profile Form -->
  <div class="card">
    <div class="label">Candidate Profile Details</div>
    <input type="text" id="fullName" placeholder="Full Name (e.g. Alex Morgan)">
    <input type="email" id="email" placeholder="Email Address">
    <input type="tel" id="phone" placeholder="Phone Number">
    <input type="text" id="location" placeholder="City, Country (e.g. Charlotte, NC)">
    <input type="text" id="linkedin" placeholder="LinkedIn Profile URL">
  </div>

  <button class="btn" id="saveProfileBtn">
    💾 Save Profile &amp; Resume
  </button>

  <button class="btn btn-secondary" id="autofillBtn">
    ⚡ Auto-Fill Active Application Form
  </button>

  <div class="footer">
    JobSpike Engine v1.0.2 • Verifiable Portal Integration
  </div>

  <script src="popup.js"></script>
</body>
</html>
